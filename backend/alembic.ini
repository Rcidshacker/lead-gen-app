# ── Alembic configuration ─────────────────────────────────────────────────
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Set to 'true' to run the environment during the 'revision' command
# regardless of autogenerate.
# revise_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions directory.
# sourceless = false

# Version path specification – useful for custom layouts
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator – default is os.pathsep (';' on Windows, ':' on *nix)
# version_path_separator = os

# The output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# The database URL is set dynamically in env.py from the app config.
# This placeholder is only used by ``alembic.ini``-only workflows.
sqlalchemy.url = postgresql://user:pass@localhost:5432/leadforge


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
